name: Worker Cron

on:
  schedule:
    - cron: "*/5 * * * *"   # a cada 5 minutos (minimo do GitHub Actions)
  workflow_dispatch:          # permite acionar manualmente pelo painel

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Acionar worker tick
        env:
          POSTHUB_WORKER_TICK_URL: ${{ secrets.POSTHUB_WORKER_TICK_URL }}
          POSTHUB_CRON_SECRET: ${{ secrets.POSTHUB_CRON_SECRET }}
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          TICK_URL="${POSTHUB_WORKER_TICK_URL:-}"
          if [ -z "$TICK_URL" ] && [ -n "$APP_URL" ]; then
            TICK_URL="${APP_URL%/}/api/worker/tick"
          fi

          TOKEN="${POSTHUB_CRON_SECRET:-$CRON_SECRET}"

          if [ -z "$TICK_URL" ]; then
            echo "Secret ausente: defina POSTHUB_WORKER_TICK_URL ou APP_URL."
            exit 1
          fi

          if [ -z "$TOKEN" ]; then
            echo "Secret ausente: defina POSTHUB_CRON_SECRET ou CRON_SECRET."
            exit 1
          fi

          STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            --max-time 90 \
            -X GET \
            -H "Authorization: Bearer $TOKEN" \
            "$TICK_URL")

          echo "HTTP $STATUS - $(cat /tmp/resp.json)"

          if [ "$STATUS" != "200" ]; then
            echo "Falha no worker tick (HTTP $STATUS)"
            exit 1
          fi

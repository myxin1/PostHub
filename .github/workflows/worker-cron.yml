name: Worker Cron

on:
  schedule:
    - cron: "*/5 * * * *"   # a cada 5 minutos (mínimo do GitHub Actions)
  workflow_dispatch:          # permite acionar manualmente pelo painel

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Acionar worker tick
        run: |
          STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            --max-time 90 \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/worker/tick")

          echo "HTTP $STATUS — $(cat /tmp/resp.json)"

          if [ "$STATUS" != "200" ]; then
            echo "Falha no worker tick (HTTP $STATUS)"
            exit 1
          fi
